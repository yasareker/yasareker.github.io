<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess App</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #0b1d2a;
        color: white;
    }

    body::before {
        content: "";
        position: fixed;
        width: 100%;
        height: 100%;
        background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
        background-size: 40px 40px;
        z-index: -1;
    }

    header {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 5px 0;
        position: relative;
    }

    /* Neon underline */
    header::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 60%;
        height: 2px;
        background: #1abc9c;
        box-shadow: 0 0 6px #1abc9c, 0 0 14px #1abc9c;
        border-radius: 2px;
    }

    header img {
        width: 40%;
        display: block;
        max-width: 500px;
        min-width: 250px;
        filter: drop-shadow(0 0 12px #1abc9c);
    }

    .lang-switch {
        position: absolute;
        top: 20px;
        right: 20px;
        cursor: pointer;
        font-weight: bold;
    }

    .container {
        max-width: 1100px;
        margin: auto;
        padding: 10px 20px 20px;
    }

    .intro {
        background: rgba(0, 100, 0, 0.2);
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        margin-top: 10px;
        margin-bottom: 40px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 30px;
        margin-bottom: 40px;
    }

    .card {
        background: #102c3c;
        padding: 20px;
        border-radius: 15px;
        border: 2px solid orange;
        position: relative;
        box-shadow: 5px 5px 0 orange;
        transition: 0.2s;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .card:hover {
        transform: translate(-5px, -5px);
        box-shadow: 10px 10px 0 orange;
    }

    .buttons {
        display: flex;
        justify-content: space-between;
        margin-top: 20px;
    }

    .btn {
        padding: 8px 12px;
        border: none;
        cursor: pointer;
        border-radius: 5px;
        font-weight: bold;
    }

    .btn-view {
        background: #1abc9c;
        color: black;
    }

    .btn-buy {
        background: orange;
        color: black;
    }

    footer {
        text-align: center;
        padding: 20px;
        opacity: 0.7;
    }

    .card-img {
        width: 100%;
        height: 180px;
        object-fit: contain;
        margin-bottom: 15px;
        filter: drop-shadow(0 0 5px rgba(255, 165, 0, 0.3));
        transition: 0.3s;
    }

    .card:hover .card-img {
        transform: scale(1.05);
    }

    /* Yardımcı Programlar stili */
    .helper-section {
        background: rgba(0, 100, 100, 0.1);
        border: 2px solid #1abc9c;
        border-radius: 12px;
        padding: 20px;
        margin-top: 20px;
        box-shadow: 0 0 10px rgba(26,188,156,0.5);
    }

    .helper-section h2 {
        text-align: center;
        color: #1abc9c;
        margin-top: 0;
        margin-bottom: 25px;
        border-bottom: 1px solid rgba(26,188,156,0.4);
        padding-bottom: 10px;
    }

    .helper-item {
        margin-bottom: 30px;
    }

    .helper-item h3 {
        margin: 0 0 10px 0;
        color: #ff8c00;
    }

    .helper-item p {
        margin: 0 0 10px 0;
    }

    .helper-item a {
        display: inline-block;
        background: #ff8c00;
        color: #0b1d2a;
        padding: 6px 12px;
        border-radius: 6px;
        text-decoration: none;
        font-weight: bold;
        box-shadow: 0 0 6px #ff8c00, 0 0 12px #ff8c00;
        transition: transform 0.2s ease;
    }

    .helper-item a:hover {
        transform: scale(1.05);
    }

    .inspect-btn {
        display: inline-block;
        float: right;
        background: #1abc9c;
        color: #0b1d2a;
        padding: 8px 14px;
        border-radius: 6px;
        font-weight: bold;
        text-decoration: none;
        box-shadow: 0 0 6px #1abc9c, 0 0 12px #1abc9c;
        transition: transform 0.2s ease;
    }

    .inspect-btn:hover {
        transform: scale(1.05);
    }

    @media (max-width: 600px) {
        .helper-item a, .inspect-btn {
            float: none;
            display: block;
            margin: 10px auto 0 auto;
        }
    }
</style>
</head>

    // Helper items
    for (let i = 1; i <= 3; i++) {
        const h = t.helpers[i-1];
        document.getElementById("h" + i + "title").innerText = h.title;
        document.getElementById("h" + i + "text").innerText = h.text;
        document.getElementById("h" + i + "link").innerText = h.link;
    }
    // GitHub link for h1 (Pgn-to-json)
    const ghLink = document.getElementById("h1githublink");
    if (ghLink) {
        ghLink.innerText = t.helpers[0].githubLink || "";
    }
}

function toggleLang() {
    currentLang = currentLang === "tr" ? "en" : "tr";
    localStorage.setItem("lang", currentLang);
    applyLang();
}

// Initialize on page load
applyLang();

function openPage(page) {
    window.open(page, '_blank');
}

}
